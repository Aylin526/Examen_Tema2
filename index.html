<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juego de Portero</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <nav class="navbar navbar-dark">
    <div class="container">
      <span class="navbar-brand fw-bold">🧤 Juego de Portero</span>
    </div>
  </nav>

  <main class="container my-4 text-center">
    <h1>Atrapa los tiros</h1>

    <h2 id="score">Puntos: 0</h2>
    <h3 id="level">Nivel: 1</h3>
    <h4 id="highScore">Récord: 0</h4>

    <button id="resetHighScore" class="btn btn-danger mb-3">
      Reiniciar récord
    </button>

    <div class="canvas-container mx-auto">
      <canvas id="canvas"></canvas>
    </div>
  </main>

  <footer class="text-center py-3 text-white">
    © 2026 Juego de Portero
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
